        function switchTab(index) {
            currentTab = index;

            // 切換天數後，平滑滾動回到頂部
            window.scrollTo({ top: 0, behavior: 'smooth' });

        function renderTabs() {
            const tabsContainer = document.getElementById('tabs-container');
            tabsContainer.innerHTML = '';
            
            itineraryData.forEach((day, index) => {
                const isActive = index === currentTab;
                const activeClasses = isActive 
                    ? 'bg-white text-[#E08E79] shadow-sm font-semibold' 
                    : 'text-[#8A8177] hover:bg-[#E5DFD3] hover:text-[#5D534A]';
                
                const btn = document.createElement('button');
                btn.className = `flex-1 py-3 px-4 rounded-xl text-sm transition-all duration-300 whitespace-nowrap flex flex-col items-center ${activeClasses}`;
                btn.onclick = () => switchTab(index);
                
                btn.innerHTML = `
                    <span class="text-[1.1rem] mb-0.5 tracking-wide">${day.day}</span>
                    <span class="text-[0.7rem] opacity-90">${day.date}</span>
                `;
                tabsContainer.appendChild(btn);
            });
        }

            const timelineLine = document.getElementById('timeline-line');

                let infoHtml = `<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">`;

                const prevText = prevData.isSummary ? '大綱' : prevData.day;
                prevBtnHtml = `
                    <div class="w-[30%] flex justify-start">
                        <button onclick="switchTab(${currentTab - 1})" class="flex items-center gap-2 text-[#8A8177] hover:text-[#E08E79] transition-colors font-semibold text-sm">
                            <i class="fa-solid fa-chevron-left text-xs"></i> 回到${prevText}
                        </button>
                    </div>
                `;
            }

            let nextBtnHtml = '<div class="w-[30%]"></div>'; 
            if (currentTab < itineraryData.length - 1) {
                const nextData = itineraryData[currentTab + 1];
                nextBtnHtml = `
                    <div class="w-[30%] flex justify-end">
                        <button onclick="switchTab(${currentTab + 1})" class="flex items-center gap-2 bg-[#A5B396] text-white px-5 py-2.5 rounded-full hover:bg-[#889779] transition-colors shadow-sm font-semibold text-sm">
                            前往 ${nextData.day} <i class="fa-solid fa-chevron-right text-xs"></i>
                        </button>
                    </div>
                `;
            }

            let topBtnHtml = `
                <div class="w-[40%] flex justify-center">
                    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="flex flex-col items-center gap-1.5 text-[#DCCDBA] hover:text-[#E08E79] transition-colors font-semibold text-xs group">
                        <div class="w-10 h-10 rounded-full border-[2px] border-[#DCCDBA] group-hover:border-[#E08E79] bg-white flex items-center justify-center transition-colors shadow-sm group-hover:shadow">
                            <i class="fa-solid fa-arrow-up text-lg"></i>
                        </div>
                        <span class="tracking-wider">Top</span>
                    </button>
                </div>
            `;

            bottomNav.innerHTML = prevBtnHtml + topBtnHtml + nextBtnHtml;
        }

        renderTabs();
        renderEvents();
    </script>
</body>
</html>
